name: Build macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Build app with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --windowed --name XiaohongshuLineHelper add_blank_lines_gui.py

      - name: Zip app bundle
        run: |
          cd dist
          zip -r XiaohongshuLineHelper-macOS.zip XiaohongshuLineHelper.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XiaohongshuLineHelper-macOS
          path: dist/XiaohongshuLineHelper-macOS.zip
